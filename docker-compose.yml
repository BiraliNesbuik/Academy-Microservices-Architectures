version: "3.9"

services:

  # ── DISPATCHER ──────────────────────────────────────────
  dispatcher:
    build: ./dispatcher
    ports:
      - "8000:8000"        # Dışarıya sadece bu açık!
    environment:
      - MONGO_URL=mongodb://dispatcher-mongo:27017
    depends_on:
      - dispatcher-mongo
      - auth-service
    networks:
      - internal

  # ── AUTH SERVİSİ ────────────────────────────────────────
  auth-service:
    build: ./auth_service
    expose:
      - "8001"             # Sadece iç ağa açık, dışarıya kapalı!
    environment:
      - MONGO_URL=mongodb://auth-mongo:27017
    depends_on:
      - auth-mongo
    networks:
      - internal

  # ── DISPATCHER'IN VERİTABANI ────────────────────────────
  dispatcher-mongo:
    image: mongo:7
    volumes:
      - dispatcher-mongo-data:/data/db
    networks:
      - internal

  # ── AUTH SERVİSİNİN VERİTABANI ─────────────────────────
  auth-mongo:
    image: mongo:7
    volumes:
      - auth-mongo-data:/data/db
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  dispatcher-mongo-data:
  auth-mongo-data: